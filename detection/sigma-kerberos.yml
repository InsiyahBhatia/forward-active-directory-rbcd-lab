title: Pass-the-Ticket — Kerberos Logon Without Prior TGT Request
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: Detects network logon via Kerberos from a source that did not issue a corresponding TGT request in the prior window, suggesting a pre-forged ticket was used.
author: Insiyah
date: 2024/01/01
tags:
  - attack.lateral_movement
  - attack.t1550.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 3
    AuthenticationPackageName: 'Kerberos'
  filter_normal:
    # Adjust to baseline — exclude known service accounts and DCs
    SubjectUserName|endswith: '$'
  condition: selection and not filter_normal
falsepositives:
  - Legitimate Kerberos network logons
  - Service accounts authenticating to shared resources
level: low
fields:
  - AccountName
  - WorkstationName
  - IpAddress
  - LogonType
