title: Suspicious S4U Kerberos Service Ticket Request
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: Detects Kerberos service ticket requests using RC4 encryption, which may indicate Kerberoasting or S4U2Proxy abuse targeting sensitive SPNs.
references:
  - https://attack.mitre.org/techniques/T1558/003/
author: Insiyah
date: 2024/01/01
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    TicketEncryptionType: '0x17'   # RC4 — downgrade indicator
  filter_computer:
    ServiceName|endswith: '$'      # Exclude machine-to-machine (common)
  condition: selection and not filter_computer
falsepositives:
  - Legacy systems requiring RC4 (Windows XP, old Java apps)
  - Misconfigured services not supporting AES
level: medium
fields:
  - AccountName
  - ServiceName
  - ClientAddress
  - TicketEncryptionType

