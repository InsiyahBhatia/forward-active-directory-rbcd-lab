title: RBCD Attribute Modified on Domain Computer Object
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: Detects modification of msDS-AllowedToActOnBehalfOfOtherIdentity on a computer object, which is the core step in Resource-Based Constrained Delegation abuse.
references:
  - https://attack.mitre.org/techniques/T1484/
  - https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/resource-based-constrained-delegation-ad-computer-object-take-over-and-privilged-code-execution
author: Insiyah
date: 2024/01/01
tags:
  - attack.privilege_escalation
  - attack.t1484
  - attack.lateral_movement
  - attack.t1550.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5136
    AttributeLDAPDisplayName: 'msDS-AllowedToActOnBehalfOfOtherIdentity'
    OperationType: '%%14674'   # Value added
  condition: selection
falsepositives:
  - Legitimate RBCD configuration by domain administrators
  - Automated deployment tools managing delegation
level: high
fields:
  - SubjectUserName
  - ObjectDN
  - AttributeValue
  - SubjectDomainName

